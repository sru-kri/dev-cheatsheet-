<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dev Cheatsheet Site</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <div class="header-top">
          <h1>Dev Cheatsheet</h1>
          <div class="theme-icon">
            <button
              id="themeToggle"
              class="theme-toggle"
              aria-label="Toggle dark mode"
            >
              <svg
                class="sun-icon"
                xmlns="http://www.w3.org/2000/svg"
                width="20"
                height="20"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <circle cx="12" cy="12" r="5"></circle>
                <line x1="12" y1="1" x2="12" y2="3"></line>
                <line x1="12" y1="21" x2="12" y2="23"></line>
                <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                <line x1="1" y1="12" x2="3" y2="12"></line>
                <line x1="21" y1="12" x2="23" y2="12"></line>
                <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
              </svg>

        <div class="search-section">
            <div class="search-wrapper">
                <input 
                    type="text" 
                    id="searchInput" 
                    class="search-bar" 
                    placeholder="Search by title or description..."
                >
                <span class="clear-btn" id="clearBtn">×</span>
            </div>
                <div class="result-count" id="resultCount"></div>
        </div>
        <p>Quick reference for common commands and snippets</p>
      </header>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="favorites">⭐ Favorites</button>
            <button class="filter-btn" data-filter="git">Git</button>
            <button class="filter-btn" data-filter="terminal">Terminal</button>
            <button class="filter-btn" data-filter="javascript">JavaScript</button>
            <button class="filter-btn" data-filter="css">CSS</button>
            <button class="filter-btn" data-filter="react">React</button>
            <button class="filter-btn" data-filter="sql">SQL</button>
        </div>
        <div id="resultCount" class="result-count"></div>
      </div>

      <div class="filter-section">
        <button class="filter-btn active" data-filter="all">
          All <span class="count" id="count-all"></span>
        </button>
        <button class="filter-btn" data-filter="git">
          <span class="dot dot-git"></span>Git
          <span class="count" id="count-git"></span>
        </button>
        <button class="filter-btn" data-filter="terminal">
          <span class="dot dot-terminal"></span>Terminal
          <span class="count" id="count-terminal"></span>
        </button>
        <button class="filter-btn" data-filter="javascript">
          <span class="dot dot-javascript"></span>JavaScript
          <span class="count" id="count-javascript"></span>
        </button>
        <button class="filter-btn" data-filter="css">
          <span class="dot dot-css"></span>CSS
          <span class="count" id="count-css"></span>
        </button>
        <button class="filter-btn" data-filter="react">
          <span class="dot dot-react"></span>React
          <span class="count" id="count-react"></span>
        </button>
        <button class="filter-btn" data-filter="sql">
           <span class="dot dot-sql"></span>SQL
           <span class="count" id="count-sql"></span></button>
      </div>

      <div id="cardsContainer" class="cards-container"></div>

      <div id="noResults" class="no-results">
        <p>No cheatsheets found. Try adjusting your search or filters.</p>
      </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
  </body>
</html>
